name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bckirkup/domain-runner
          path: domain-runner
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e domain-runner[dev]
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bckirkup/domain-runner
          path: domain-runner
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e domain-runner[dev]
          pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bckirkup/domain-runner
          path: domain-runner
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e domain-runner[dev]
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -m "not smoke" --cov=tattletots --cov-report=term-missing
      - name: Run COP relevance and dispatch tests
        run: pytest tests/test_relevance.py tests/test_user_cop.py tests/test_dispatch_integration.py -q

  smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bckirkup/domain-runner
          path: domain-runner
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e domain-runner[dev]
          pip install -e ".[dev]"
      - name: Run smoke tests
        run: pytest -m smoke --tb=short
